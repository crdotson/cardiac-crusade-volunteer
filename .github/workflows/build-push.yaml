name: Build and Push to Local Registry

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t localhost:5000/my-app:${{ github.sha }} .

      - name: Push to k3s registry
        run: docker push localhost:5000/my-app:${{ github.sha }}
