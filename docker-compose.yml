version: '3.8'
services:
  app:
    build: .
    ports:
      - "1443:3000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cardiac_crusade
      - POSTGRES_HOST=db
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cardiac_crusade
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: